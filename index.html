<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mom's Help List</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div>
      <h1>Mom's Help List</h1>
      <p>Family task board for helping Mom</p>
    </div>
  </header>
    

    <nav class="tabs">
      <button data-tab="dashboard" class="active">Dashboard</button>
      <button data-tab="register">Register</button>
      <button data-tab="tasks">Tasks</button>
      <button data-tab="add">Add Task</button>
      <button data-tab="members">Members</button>
      <button data-tab="calendar">Calendar</button>
      <button data-tab="history">History</button>
      <button data-tab="contacts">Emergency Contacts</button>
      <button data-tab="shopping">Shopping List</button>
    </nav>

    <section id="dashboard" class="tab active">
      <div class="stats">
        <div><strong id="openCount">0</strong><span>Open</span></div>
        <div><strong id="progressCount">0</strong><span>In Progress</span></div>
        <div><strong id="pastDueCount">0</strong><span>Past Due</span></div>
        <div><strong id="doneCount">0</strong><span>Completed</span></div>
      </div>
      <h2>Urgent & Past Due</h2>
      <div id="urgentList" class="cards"></div>
    </section>
    <section id="register" class="tab">

    <section class="panel profile-panel">
    <h2>Register / Who are you?</h2>

    <div class="grid two">
      <label>Your name
        <input id="currentUser" placeholder="Melissa, Mom, Sarah..." />
      </label>

      <label>Role
        <select id="currentRole">
          <option>Self</option>
          <option>Mom</option>
          <option>Daughter</option>
          <option>Sibling</option>
          <option>Contractor</option>
          <option>Other</option>
        </select>
      </label>
    </div>

    <button id="saveProfile">Save profile</button>
  </section>
    </section>
  

    <section id="tasks" class="tab">
      <div class="toolbar">
        <select id="filterStatus">
          <option value="all">All active tasks</option>
          <option>Open</option>
          <option>Accepted</option>
          <option>Started</option>
          <option>In Progress</option>
          <option>Past Due</option>
        </select>
        <select id="filterPriority">
          <option value="all">All priorities</option>
          <option>Urgent</option>
          <option>High Priority</option>
          <option>Medium Priority</option>
          <option>Low Priority</option>
        </select>
      </div>
      <div id="taskList" class="cards"></div>
    </section>

    
<section id="add" class="tab">
  <form id="taskForm" class="panel">
    <h2>Add a task</h2>

    <label>Task title<input id="title" required placeholder="Move wood, repair window, mow lawn..." /></label>

    <label>Description<textarea id="description" placeholder="Details, instructions, measurements, etc."></textarea></label>

    <div class="grid two">
      <label>Priority
        <select id="priority">
          <option>Urgent</option>
          <option>High Priority</option>
          <option selected>Medium Priority</option>
          <option>Low Priority</option>
        </select>
      </label>

      <label>Category
  <select id="category">
    <option>Yard Work</option>
    <option>Home Repair</option>
    <option>Shopping</option>
    <option>Appointments</option>
    <option>Medical</option>
    <option>Vehicle</option>
    <option>Contractor</option>
    <option>Other</option>
  </select>
      </label>

      <label>Needed by<input id="neededBy" type="date" /></label>

      <label>Recurring
        <select id="recurring">
          <option>None</option>
          <option>Daily</option>
          <option>Weekly</option>
          <option>Monthly</option>
        </select>
      </label>
    </div>

    <div class="panel">
  <h3>Materials Needed</h3>

  <div id="materialsList"></div>

  <button type="button" id="addMaterialBtn">
    + Add Material
  </button>
    </div>

    <label>Linked Project / Task
      <input id="linkedProject" placeholder="Porch repair, mowing, goat fence..." />
    </label>

    <label>Purchase Notes
      <textarea id="materialNotes" placeholder="Home Depot aisle, contractor recommendation, color, size, etc."></textarea>
    </label>

    <label>Contractor quotes
      <textarea id="quotes" placeholder="Contractor name, quote amount, phone, notes..."></textarea>
    </label>

    <label>Photo URL
  <input id="photoUrl" placeholder="Paste image link here" />
    </label>

    <button type="submit">Add Task</button>
  </form>
</section>
  
<section id="members" class="tab">
  <form id="memberForm" class="panel">
    <h2>Add member</h2>

    <div class="grid two">
      <label>Name<input id="memberName" required /></label>
      <label>Role
        <select id="memberRole">
          <option>Self</option>
          <option>Contractor</option>
          <option>Other</option>
        </select>
      </label>
    </div>

    <label>Contact info<input id="memberContact" placeholder="Phone or email" /></label>
    <<label>Photo Upload<input id="memberPhoto" placeholder="Paste photo link" /></label>
    <button type="submit">Add Member</button>
  </form>

  <div id="memberList" class="cards"></div>
</section>

<section id="calendar" class="tab">
  <h2>Task Calendar</h2>
  <div id="calendarList" class="cards"></div>
</section>
    
    <section id="contacts" class="tab">
  <form id="contactForm" class="panel">
    <h2>Emergency Contacts</h2>

    <div class="grid two">
      <label>Name
        <input id="contactName" required />
      </label>

      <label>Relationship
        <input id="contactRelation" placeholder="Doctor, Daughter, Neighbor..." />
      </label>
    </div>

    <div class="grid two">
      <label>Phone
        <input id="contactPhone" />
      </label>

      <label>Email
        <input id="contactEmail" />
      </label>
    </div>

    <button type="submit">Save Contact</button>
  </form>

  <div id="contactList" class="cards"></div>
    </section>

    <section id="shopping" class="tab">
  <form id="shoppingForm" class="panel">
    <h2>Shopping List</h2>

    <label>Item
      <input id="shopItem" required placeholder="Mulch, screws, paint..." />
    </label>

    <label>Quantity
      <input id="shopQty" placeholder="2 bags, 10 boards..." />
    </label>

    <label>Estimated Cost
      <input id="shopCost" type="number" min="0" step="0.01" />
    </label>

    <label>Project
      <input id="shopProject" placeholder="Fence, porch, mowing..." />
    </label>

    <label>Notes
      <textarea id="shopNotes"></textarea>
    </label>

    <button type="submit">Add Shopping Item</button>
  </form>

  <div id="shoppingList" class="cards"></div>
    </section>
    <section id="history" class="tab">
  <h2>Completed Task History</h2>

  <button id="deleteAllCompletedBtn">
    Delete All Completed Tasks
  </button>

  <div id="historyList" class="cards"></div>
    </section>
  
  <div id="editModal" class="modal hidden">
  <div class="modalBox">
    <h2>Edit Task</h2>

    <input type="hidden" id="editTaskId" />

    <label>Title
      <input id="editTitle" />
    </label>

    <label>Description
      <textarea id="editDescription"></textarea>
    </label>

    <label>Needed By
      <input id="editNeededBy" type="date" />
    </label>

    <label>Planned Date
      <input id="editPlannedDate" type="date" />
    </label>

    <label>Materials
      <textarea id="editMaterials"></textarea>
    </label>

    <label>Estimated Project Cost
      <input id="editCost" type="number" step="0.01" />
    </label>

    <label>Notes
      <textarea id="editNotes"></textarea>
    </label>

    <label>Quotes
      <textarea id="editQuotes"></textarea>
    </label>

    <div class="actions">
      <button type="button" id="saveEditTask">Save Changes</button>
      <button type="button" id="closeEditModal">Cancel</button>
    </div>
  </div>
  </div>
  <div id="viewModal" class="modal hidden">
  <div class="modalBox">
    <h2 id="viewTitle">Task Details</h2>
    <div id="viewTaskDetails"></div>
    <button type="button" id="closeViewModal">Close</button>
  </div>
  </div>  

<input id="hiddenDatePicker" type="date" style="display:none;" />

<script type="module" src="app.js"></script>
</body>
</html>
