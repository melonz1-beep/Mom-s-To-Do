<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mom's Help List</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div>
      <h1>Mom's Help List</h1>
      <p>Family task board for helping Mom</p>
    </div>
    <button id="seedBtn" class="ghost">Add Sample Tasks</button>
  </header>

  <main>
    <section class="panel profile-panel">
      <h2>Who are you?</h2>
      <div class="grid two">
        <label>Your name<input id="currentUser" placeholder="Melissa, Mom, Sarah..." /></label>
        <label>Role
          <select id="currentRole">
            <option>Self</option><option>Mother</option><option>Sibling</option><option>Daughter</option><option>Spouse</option><option>Contractor</option>
          </select>
        </label>
      </div>
      <button id="saveProfile">Save profile</button>
    </section>

    <nav class="tabs">
      <button data-tab="dashboard" class="active">Dashboard</button>
      <button data-tab="tasks">Tasks</button>
      <button data-tab="add">Add Task</button>
      <button data-tab="members">Members</button>
      <button data-tab="history">History</button>
    </nav>

    <section id="dashboard" class="tab active">
      <div class="stats">
        <div><strong id="openCount">0</strong><span>Open</span></div>
        <div><strong id="progressCount">0</strong><span>In Progress</span></div>
        <div><strong id="pastDueCount">0</strong><span>Past Due</span></div>
        <div><strong id="doneCount">0</strong><span>Completed</span></div>
      </div>
      <h2>Urgent & Past Due</h2>
      <div id="urgentList" class="cards"></div>
    </section>

    <section id="tasks" class="tab">
      <div class="toolbar">
        <select id="filterStatus"><option value="all">All active tasks</option><option>Open</option><option>Accepted</option><option>Started</option><option>In Progress</option><option>Past Due</option></select>
        <select id="filterPriority"><option value="all">All priorities</option><option>Urgent</option><option>High Priority</option><option>Medium Priority</option><option>Low Priority</option></select>
      </div>
      <div id="taskList" class="cards"></div>
    </section>

    <section id="add" class="tab">
      <form id="taskForm" class="panel">
        <h2>Add a task</h2>
        <label>Task title<input id="title" required placeholder="Move wood, repair window, mow lawn..." /></label>
        <label>Description<textarea id="description" placeholder="Details, instructions, measurements, etc."></textarea></label>
        <div class="grid two">
          <label>Priority<select id="priority"><option>Urgent</option><option>High Priority</option><option selected>Medium Priority</option><option>Low Priority</option></select></label>
          <label>Needed by<input id="neededBy" type="date" /></label>
        </div>
        <div class="grid two">
          <label>Materials needed<textarea id="materials"></textarea></label>
          <label>Estimated cost<input id="cost" type="number" min="0" step="0.01" placeholder="0.00" /></label>
        </div>
        <label>Contractor quotes<textarea id="quotes" placeholder="Contractor name, quote amount, phone, notes..."></textarea></label>
        <label>Photo URL<input id="photoUrl" placeholder="Paste an image link for now" /></label>
        <button type="submit">Add Task</button>
      </form>
    </section>

    <section id="members" class="tab">
      <form id="memberForm" class="panel">
        <h2>Add member</h2>
        <div class="grid two">
          <label>Name<input id="memberName" required /></label>
          <label>Role
  <select id="memberRole">
    <option>Mother</option>
    <option>Daughter</option>
    <option>Granddaughter</option>
    <option>Great-Grandson</option>
    <option>Spouse</option>
    <option>Contractor</option>
    <option>Other</option>
  </select>
          </label>
          </select>
        </div>
        <label>Contact info<input id="memberContact" placeholder="Phone or email" /></label>
        <button>Add Member</button>
      </form>
      <div id="memberList" class="cards"></div>
    </section>

    <section id="history" class="tab">
      <h2>Completed Task History</h2>
      <div id="historyList" class="cards"></div>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
